<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>标签:市场AI - AI 研究团队知识库</title>
<style>
:root{
  --link:#3366cc; --link-visited:#795cb2; --text:#202122; --bg:#fff;
  --grey-bg:#f8f9fa; --border:#a2a9b1; --border-light:#c8ccd1; --grey-text:#54595d;
  --ui-font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  --serif-font:Georgia,"Times New Roman","Songti SC","SimSun",serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--serif-font);color:var(--text);background:var(--grey-bg);line-height:1.6;font-size:15px;}
a{color:var(--link);text-decoration:none;}
a:hover{text-decoration:underline;}
a:visited{color:var(--link-visited);}

/* 页眉 */
.mw-header{background:var(--bg);border-bottom:1px solid var(--border-light);box-shadow:0 1px 3px rgba(0,0,0,.04);}
.mw-header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0.55rem 1rem;}
.mw-site{font-family:var(--ui-font);font-size:1.05rem;font-weight:600;color:var(--text);}
.mw-site:hover{text-decoration:none;}
.mw-search{position:relative;}
.mw-search input{font-family:var(--ui-font);width:220px;padding:0.35rem 0.7rem;font-size:0.82rem;border:1px solid var(--border-light);border-radius:2px;outline:none;}
.mw-search input:focus{border-color:#36c;box-shadow:0 0 0 2px rgba(51,102,204,.15);}

/* 布局：左栏导航 + 主内容 */
.mw-body{max-width:1100px;margin:0 auto;display:flex;align-items:flex-start;}
.mw-nav{width:150px;flex-shrink:0;padding:1rem 0.4rem;border-right:1px solid var(--border-light);font-family:var(--ui-font);font-size:0.82rem;min-height:calc(100vh - 56px);}
.mw-nav .nav-title{font-size:0.72rem;text-transform:uppercase;letter-spacing:.04em;color:var(--grey-text);padding:0.5rem 0.5rem 0.2rem;font-weight:600;}
.mw-nav a{display:block;padding:0.22rem 0.5rem;color:var(--link);border-radius:2px;}
.mw-nav a:hover{background:var(--grey-bg);text-decoration:none;}
.mw-nav .nav-sep{border-top:1px solid var(--border-light);margin:0.4rem 0.3rem;}

.mw-main{flex:1;min-width:0;background:var(--bg);border:1px solid var(--border-light);border-top:none;padding:1.1rem 1.6rem 2.2rem;margin:0 0 2rem;}

/* 标题 */
.mw-title h1{font-family:var(--ui-font);font-size:1.7rem;font-weight:400;line-height:1.25;border-bottom:1px solid var(--border-light);padding-bottom:0.3rem;margin-bottom:0.2rem;}
.mw-title .sub{font-family:var(--ui-font);font-size:0.8rem;color:var(--grey-text);margin-bottom:0.6rem;}

/* 正文排版 */
.mw-content h1{font-family:var(--ui-font);font-size:1.45rem;font-weight:400;border-bottom:1px solid var(--border-light);padding-bottom:0.2rem;margin:1.4rem 0 0.5rem;}
.mw-content h2{font-family:var(--ui-font);font-size:1.25rem;font-weight:400;border-bottom:1px solid var(--border-light);padding-bottom:0.2rem;margin:1.3rem 0 0.5rem;}
.mw-content h3{font-family:var(--ui-font);font-size:1.02rem;font-weight:600;margin:1rem 0 0.35rem;}
.mw-content h4{font-family:var(--ui-font);font-size:0.92rem;font-weight:600;margin:0.8rem 0 0.3rem;}
.mw-content p{margin-bottom:0.7rem;}
.mw-content ul,.mw-content ol{margin:0.5rem 0 0.6rem 1.7rem;}
.mw-content li{margin-bottom:0.25rem;}
.mw-content blockquote{border-left:3px solid var(--border);padding:0.3rem 1rem;background:var(--grey-bg);margin:0.7rem 0;color:var(--grey-text);font-size:0.92rem;}
.mw-content table{border-collapse:collapse;margin:0.7rem 0;font-size:0.9rem;width:auto;}
.mw-content td,.mw-content th{border:1px solid var(--border-light);padding:0.4rem 0.65rem;text-align:left;}
.mw-content th{background:var(--grey-bg);font-family:var(--ui-font);font-weight:600;}
.mw-content code{font-family:"SF Mono",Consolas,monospace;background:var(--grey-bg);padding:0.1rem 0.32rem;border-radius:2px;font-size:0.85em;}
.mw-content pre{background:var(--grey-bg);padding:0.7rem 0.9rem;border:1px solid var(--border-light);border-radius:3px;overflow-x:auto;font-size:0.82rem;margin:0.7rem 0;}
.mw-content .dangling{color:#d85a30;border-bottom:1px dashed #d85a30;cursor:help;}

/* 信息框 infobox（右浮动） */
.infobox{float:right;width:290px;margin:0.4rem 0 1rem 1.6rem;background:var(--grey-bg);border:1px solid var(--border);border-radius:3px;font-family:var(--ui-font);font-size:0.84rem;clear:right;}
.infobox .ib-title{background:#eaf3ff;border-bottom:1px solid var(--border);text-align:center;font-weight:600;padding:0.45rem 0.5rem;font-size:0.95rem;color:#202122;}
.infobox .ib-sub{text-align:center;font-size:0.78rem;color:var(--grey-text);padding:0.25rem;}
.infobox .ib-row{display:flex;border-bottom:1px solid var(--border-light);}
.infobox .ib-row:last-child{border-bottom:none;}
.infobox .ib-label{flex:0 0 38%;padding:0.35rem 0.55rem;background:#f3f6fa;color:var(--grey-text);font-weight:500;border-right:1px solid var(--border-light);}
.infobox .ib-value{flex:1;padding:0.35rem 0.55rem;word-break:break-word;}
.infobox .ib-value a{color:var(--link);}

/* 自动目录 TOC */
.toc{display:inline-block;background:var(--grey-bg);border:1px solid var(--border-light);padding:0.6rem 1rem 0.7rem;margin:0.3rem 0 1.1rem;font-family:var(--ui-font);font-size:0.84rem;border-radius:2px;min-width:240px;}
.toc .toc-title{font-weight:600;margin-bottom:0.35rem;color:#202122;}
.toc ul{list-style:none;margin:0;padding-left:1.1rem;}
.toc>ul{padding-left:0;}
.toc li{margin:0.15rem 0;line-height:1.4;}
.toc a{color:var(--link);}
.toc .toc-n{color:var(--grey-text);margin-right:0.3rem;}

/* 底部分类栏 */
.mw-catlinks{margin-top:2rem;padding:0.55rem 0.8rem;background:var(--grey-bg);border:1px solid var(--border-light);font-family:var(--ui-font);font-size:0.82rem;color:var(--grey-text);}
.mw-catlinks .cl-prefix{font-weight:600;margin-right:0.4rem;}
.mw-catlinks a{color:var(--link);}

/* 维基式标签/徽章 */
.tagpill{display:inline-block;font-family:var(--ui-font);font-size:0.74rem;background:var(--grey-bg);border:1px solid var(--border-light);padding:1px 7px;border-radius:3px;margin:1px;}
.tagpill a{color:var(--link);}
.badge{display:inline-block;font-family:var(--ui-font);font-size:0.72rem;padding:1px 7px;border-radius:3px;color:#fff;}
.badge-high{background:#1e8e3e;} .badge-medium{background:#f9ab00;color:#202122;} .badge-low{background:#d93025;}

/* 分类页 / 标签页 列表 */
.catpage-section{margin-bottom:1.6rem;}
.catpage-section h2{font-family:var(--ui-font);font-size:1.15rem;font-weight:400;border-bottom:1px solid var(--border-light);padding-bottom:0.2rem;margin-bottom:0.6rem;}
.catpage-list{list-style:none;margin:0;padding:0;}
.catpage-list li{padding:0.34rem 0.2rem;border-bottom:1px solid #f0f0f0;font-family:var(--ui-font);font-size:0.9rem;display:flex;align-items:baseline;}
.catpage-list li:last-child{border-bottom:none;}
.catpage-list .pl-title{font-weight:500;}
.catpage-list .pl-meta{color:var(--grey-text);font-size:0.78rem;margin-left:0.6rem;}
.catpage-list .pl-meta .tagpill{font-size:0.7rem;}

/* 首页：分类/最近更新 区块 */
.home-intro{font-family:var(--ui-font);font-size:0.92rem;color:#333;margin-bottom:1.2rem;line-height:1.6;}
.home-grid{display:grid;grid-template-columns:1fr 320px;gap:1.6rem;align-items:start;}
.home-cats{font-family:var(--ui-font);}
.home-cat-row{display:flex;align-items:baseline;padding:0.5rem 0;border-bottom:1px solid #f0f0f0;}
.home-cat-row .hc-name{font-size:1rem;font-weight:600;min-width:120px;}
.home-cat-row .hc-name a{color:var(--link);}
.home-cat-row .hc-count{color:var(--grey-text);font-size:0.8rem;margin-left:0.6rem;min-width:54px;}
.home-cat-row .hc-desc{color:var(--grey-text);font-size:0.82rem;margin-left:0.6rem;flex:1;}
.home-side .box{background:var(--grey-bg);border:1px solid var(--border-light);border-radius:3px;padding:0.8rem 1rem;margin-bottom:1rem;font-family:var(--ui-font);}
.home-side .box h3{font-size:0.9rem;font-weight:600;margin-bottom:0.5rem;color:#202122;}
.home-side .upd{font-size:0.82rem;padding:0.25rem 0;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;}
.home-side .upd a{color:var(--link);}
.home-side .upd .ud{color:#aaa;font-size:0.72rem;white-space:nowrap;margin-left:0.5rem;}
.graph-box svg{width:100%;height:300px;}

/* 层级导航（标签父/子，对标维基 category 页） */
.hierarchy{background:var(--grey-bg);border:1px solid var(--border-light);border-radius:3px;padding:0.6rem 0.9rem;margin:0.2rem 0 1.2rem;font-family:var(--ui-font);font-size:0.84rem;}
.hier-row{margin:0.3rem 0;}
.hier-label{color:var(--grey-text);font-weight:600;margin-right:0.4rem;}
.hier-link{color:var(--link);}
.hier-none{color:#aaa;}
.hier-note{color:var(--grey-text);}

/* 标签总览树 */
.tagtree{list-style:none;padding-left:0;font-family:var(--ui-font);}
.tagtree ul{list-style:none;padding-left:1.3rem;border-left:1px solid var(--border-light);margin-left:0.4rem;}
.tagtree li{padding:3px 0;font-size:0.9rem;}
.tagtree .tn{color:var(--link);}
.tagtree .tc{font-size:0.72rem;color:var(--grey-text);margin-left:0.3rem;}

/* 详情页引用的反向链接/来源列表 */
.metalist{font-family:var(--ui-font);font-size:0.84rem;}
.metalist a{color:var(--link);display:block;padding:0.22rem 0;border-bottom:1px solid #f5f5f5;}
.footer-note{text-align:center;color:#aaa;font-family:var(--ui-font);font-size:0.74rem;margin-top:1.5rem;}

@media (max-width:900px){
  .mw-body{flex-direction:column;}
  .mw-nav{width:100%;min-height:0;border-right:none;border-bottom:1px solid var(--border-light);display:flex;flex-wrap:wrap;gap:0.2rem;padding:0.5rem;}
  .mw-nav .nav-title,.mw-nav .nav-sep{display:none;}
  .infobox{float:none;width:auto;margin:1rem 0;}
  .home-grid{grid-template-columns:1fr;}
}
</style>
</head>
